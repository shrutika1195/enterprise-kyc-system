# ?? Application ??
spring.application.name=kyc-system
server.port=8080

# ?? Database (H2 in-memory for dev; switch to MySQL/PostgreSQL for production) ??
spring.datasource.url=jdbc:h2:file:./kyc-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? File Upload ??
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ?? Email OTP Configuration (Using Gmail - Free & Unlimited) ??
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password  # Generate from Google Account > Security > App Passwords
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ?? OTP Configuration ??
otp.expiry.seconds=120

# ?? Production Database (uncomment and fill in for MySQL) ??
