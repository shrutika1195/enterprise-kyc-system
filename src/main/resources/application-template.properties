spring.application.name=kyc-system
server.port=8080

spring.datasource.url=jdbc:h2:file:./kyc-db
spring.datasource.username=sa
spring.datasource.password=

# Email Configuration (Fill with your credentials for local testing)
spring.mail.username=YOUR_EMAIL@gmail.com              ? Changed to placeholder
spring.mail.password=YOUR_APP_PASSWORD                 ? Changed to placeholder
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP Configuration
otp.expiry.seconds=120

# Logging
logging.level.com.internship.kyc_system=DEBUG
logging.level.org.springframework.security=WARN